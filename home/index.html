<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Charmaine Wong</title>
		<meta
			name="description"
			content="Charmaine Wong is a Hong Kong-based photographer working across urban landscapes, interiors, food, and people."
		/>
		<link rel="icon" href="../images/icons/DSF9428.jpg" type="image/jpeg" />
		<link rel="stylesheet" href="../assets/css/fontawesome-all.min.css" />
		<link rel="stylesheet" href="../assets/css/site.css" />
	</head>
	<body>
		<div class="site-shell">
			<header class="site-header">
				<a class="brand" href="../">Charmaine Wong</a>
				<nav class="site-nav" aria-label="Primary">
					<a class="is-active" href="../home/">Home</a>
					<a href="../work/">Work</a>
					<a href="../about/">About</a>
					<a class="nav-ig" href="https://instagram.com/charmainetakes" aria-label="Instagram">
						<img src="../images/icons/Layer 1.png" alt="" />
					</a>
				</nav>
			</header>

			<main class="page page-home">
				<section class="home-wall" aria-label="Selected photographs">
					<figure class="wall-card">
						<img src="../images/optimized/home/_DSF8674.jpg" alt="Boats resting on calm water near the city." decoding="async" fetchpriority="high" />
					</figure>
					<figure class="wall-card">
						<img src="../images/optimized/home/R0001509.jpg" alt="A city road seen through foreground framing." decoding="async" fetchpriority="high" />
					</figure>
					<figure class="wall-card">
						<img src="../images/optimized/home/R0005916.jpg" alt="Warm neon reflections against a dark street scene." loading="lazy" decoding="async" />
					</figure>
					<figure class="wall-card">
						<img src="../images/optimized/home/_DSF1853.jpg" alt="Blue-toned city view through a large window." loading="lazy" decoding="async" />
					</figure>
					<figure class="wall-card">
						<img src="../images/optimized/home/_DSF9242.jpg" alt="Two people seen through a soft blurred foreground." loading="lazy" decoding="async" />
					</figure>
					<figure class="wall-card">
						<img src="../images/optimized/home/R0004480.jpg" alt="A black and white street scene with scaffolding." loading="lazy" decoding="async" />
					</figure>
					<figure class="wall-card">
						<img src="../images/optimized/home/DSCF9525.jpg" alt="Reflections of two figures against a glass facade." loading="lazy" decoding="async" />
					</figure>
					<figure class="wall-card">
						<img src="../images/optimized/home/R0004094.jpg" alt="A warm interior night scene seen through glass." loading="lazy" decoding="async" />
					</figure>
				</section>
			</main>
		</div>
	</body>
</html>
